version: "3.9"

services:

  # Vector database for semantic search (Qdrant)
  qdrant:
    image: qdrant/qdrant:v1.11.1
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # Graph database for medical knowledge graph (Neo4j)
  neo4j:
    image: neo4j:5
    container_name: neo4j
    ports:
      - "7474:7474" # Neo4j Browser (HTTP UI)
      - "7687:7687" # Bolt protocol for application queries
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-your_password_here}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data

volumes:
  qdrant_data:
  neo4j_data:


